name: CI Pipeline - Cloud Cost Optimizer

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

env:
  PYTHON_DEFAULT: "3.11"

jobs:
  lint:
    name: "🔍 Lint & Format Check"
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_DEFAULT }}
        cache: 'pip'

    - name: Install linting tools
      run: pip install black isort flake8

    - name: Check formatting (black)
      run: black . --check --exclude="/(frontend|node_modules|\.venv|venv)/"

    - name: Check imports (isort)
      run: isort . --check-only --skip-glob="frontend/*" --skip-glob="node_modules/*"

    - name: Lint (flake8 — critical errors only)
      run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --exclude=frontend,node_modules,.venv,venv

  validate:
    name: "✅ OpenEnv Interface Validation"
    runs-on: ubuntu-latest
    needs: lint
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_DEFAULT }}
        cache: 'pip'

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Validate OpenEnv Interface (10 checks)
      run: python validate.py

  test:
    name: "🧪 Tests (Python ${{ matrix.python-version }})"
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov pytest-mock

    - name: Run unit tests with coverage
      run: pytest tests/ -v --cov=env --cov=agent --cov=utils --cov-report=xml --cov-fail-under=70

    - name: Upload coverage to Codecov
      if: matrix.python-version == '3.11'
      uses: codecov/codecov-action@v4
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        fail_ci_if_error: false

  baseline:
    name: "📊 Baseline Evaluation"
    runs-on: ubuntu-latest
    needs: [validate, test]
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_DEFAULT }}
        cache: 'pip'

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Run baseline agents
      run: python agent/evaluate.py --output evaluation_results.json

    - name: Upload evaluation results
      uses: actions/upload-artifact@v4
      with:
        name: evaluation-results
        path: evaluation_results.json
        retention-days: 30
